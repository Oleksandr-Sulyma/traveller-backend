User:
  type: object
  properties:
    id:
      type: string
      example: '65fb50c80ae91338641121f5'
    name:
      type: string
      example: 'Олександр'
    email:
      type: string
      format: email
      example: 'alex@example.com'
    avatarUrl:
      type: string
      nullable: true
      example: 'https://res.cloudinary.com/demo/image/upload/v1/avatar.jpg'
    articlesAmount:
      type: integer
      default: 0
    description:
      type: string
      maxLength: 150
      nullable: true
    savedStories:
      type: array
      items:
        type: string
      description: Масив ID збережених історій
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

UserResponse:
  type: object
  description: Стандартна відповідь при реєстрації, логіні або перевірці сесії
  properties:
    id:
      type: string
    name:
      type: string
    email:
      type: string
    avatarUrl:
      type: string
      nullable: true

RegisterRequest:
  type: object
  required: [name, email, password]
  properties:
    name:
      type: string
      minLength: 2
      maxLength: 32
    email:
      type: string
      format: email
      maxLength: 64
    password:
      type: string
      minLength: 8
      maxLength: 128

LoginRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
      format: email
    password:
      type: string

RequestResetEmailRequest:
  type: object
  required: [email]
  properties:
    email:
      type: string
      format: email

ResetPasswordRequest:
  type: object
  required: [token, password]
  properties:
    token:
      type: string
    password:
      type: string
      minLength: 8

Story:
  type: object
  properties:
    id:
      type: string
    title:
      type: string
      example: 'Захід сонця в горах'
    article:
      type: string
    img:
      type: string
      format: uri
    favoriteCount:
      type: integer
      default: 0
    formattedDate:
      type: string
      example: '24.05.2024'
    category:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
    ownerId:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        avatarUrl: { type: string, nullable: true }
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

StoryPost:
  type: object
  required: [title, article, category, img]
  properties:
    title:
      type: string
      maxLength: 80
    article:
      type: string
      maxLength: 2500
    category:
      type: string
      description: MongoDB ObjectId категорії
    img:
      type: string
      format: binary
      description: Файл зображення (multipart/form-data)

StoryUpdate:
  type: object
  properties:
    title:
      type: string
      maxLength: 80
    article:
      type: string
      maxLength: 2500
    category:
      type: string
    img:
      type: string
      format: binary

StoryListResponse:
  type: object
  properties:
    stories:
      type: array
      items:
        $ref: '#/Story'
    pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        perPage:
          type: integer
          example: 10
        totalItems:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 5
        hasNextPage:
          type: boolean
          example: true
        hasPreviousPage:
          type: boolean
          example: false

Category:
  type: object
  properties:
    id:
      type: string
    name:
      type: string
      example: 'Nature'

Error:
  type: object
  properties:
    status:
      type: integer
      example: 400
    message:
      type: string
      example: 'Помилка валідації'
