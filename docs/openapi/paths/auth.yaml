register:
  post:
    summary: Реєстрація користувача 📝
    description: Створює новий акаунт та автоматично встановлює сесійні куки.
    operationId: registerUser
    tags:
      - Auth
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/RegisterRequest'
    responses:
      '201':
        description: Успішна реєстрація
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/UserResponse'
      '400':
        description: Помилка валідації
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'
      '409':
        description: Користувач з такою поштою вже зареєстрований
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

login:
  post:
    summary: Вхід у систему 🔑
    description: Перевіряє дані користувача та видає сесійні куки.
    operationId: loginUser
    tags:
      - Auth
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/LoginRequest'
    responses:
      '200':
        description: Успішний вхід
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/UserResponse'
      '401':
        description: Невірна пошта або пароль
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

refresh:
  post:
    summary: Оновлення сесії 🔄
    description: Використовує refreshToken з кук для генерації нової сесії.
    operationId: refreshUserSession
    tags:
      - Auth
    responses:
      '200':
        description: Сесію оновлено
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 'Сесію оновлено'
      '401':
        description: Сесія недійсна або відсутня
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

logout:
  post:
    summary: Вихід із системи 🚪
    description: Видаляє активну сесію з бази даних та очищує куки на клієнті.
    operationId: logoutUser
    tags:
      - Auth
    security:
      - cookieAuth: []
    responses:
      '204':
        description: Успішний вихід (без тіла відповіді)
      '401':
        description: Неавторизований
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

check:
  get:
    summary: Перевірка поточної сесії ✅
    description: Повертає дані користувача, якщо сесія в куках активна.
    operationId: checkSession
    tags:
      - Auth
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Користувач авторизований
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/UserResponse'
      '401':
        description: Неавторизований
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

request-reset-email:
  post:
    summary: Запит на відновлення пароля 📧
    description: Надсилає на пошту посилання з тимчасовим токеном.
    operationId: requestResetEmail
    tags:
      - Auth
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/RequestResetEmailRequest'
    responses:
      '200':
        description: Лист надіслано
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 'Лист для відновлення пароля надіслано'
      '400':
        description: Некоректний email
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'
      '404':
        description: Користувача з такою поштою не існує
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

reset-password:
  post:
    summary: Встановлення нового пароля 🆕
    description: Оновлює пароль користувача за наявності валідного токена.
    operationId: resetPassword
    tags:
      - Auth
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/ResetPasswordRequest'
    responses:
      '200':
        description: Пароль змінено
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: 'Пароль успішно змінено'
      '400':
        description: Некоректний або прострочений токен
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'
