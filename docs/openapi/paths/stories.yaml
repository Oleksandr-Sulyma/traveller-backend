storiesRoot:
  get:
    summary: Отримати всі історії 🌍
    operationId: getAllStories
    tags:
      - Stories
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      - in: query
        name: perPage
        schema:
          type: integer
          default: 10
      - in: query
        name: category
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
      - in: query
        name: author
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
      - in: query
        name: favorite
        schema:
          type: string
          enum: ['true', 'false']
      - in: query
        name: sortBy
        schema:
          type: string
          enum: [createdAt, title, favoriteCount]
          default: favoriteCount
      - in: query
        name: sortOrder
        schema:
          type: string
          enum: [asc, desc]
          default: desc
    responses:
      '200':
        description: Список історій з пагінацією
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/StoryListResponse'

  post:
    summary: Створити нову історію ✍️
    operationId: createStory
    tags:
      - Stories
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas.yaml#/StoryPost'
    responses:
      '201':
        description: Історію успішно створено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Story'
      '400':
        description: Помилка валідації
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

storiesOwn:
  get:
    summary: Власні історії 👤
    operationId: getOwnStories
    tags:
      - Stories
    security:
      - cookieAuth: []
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      - in: query
        name: perPage
        schema:
          type: integer
          default: 10
    responses:
      '200':
        description: Список ваших історій
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/StoryListResponse'

storiesSaved:
  get:
    summary: Збережені історії ⭐
    operationId: getSavedStories
    tags:
      - Stories
    security:
      - cookieAuth: []
    responses:
      '200':
        description: Список збережених історій
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yaml#/Story'

storyById:
  get:
    summary: Деталі історії 📖
    operationId: getStoryById
    tags:
      - Stories
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
    responses:
      '200':
        description: Дані історії отримано
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Story'
      '404':
        description: Історію не знайдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Error'

  patch:
    summary: Оновити історію ✏️
    operationId: updateStory
    tags:
      - Stories
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
    requestBody:
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas.yaml#/StoryUpdate'
    responses:
      '200':
        description: Історію оновлено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Story'

  delete:
    summary: Видалити історію 🗑️
    operationId: deleteStory
    tags:
      - Stories
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
    responses:
      '204':
        description: Історію видалено

storySave:
  post:
    summary: Додати в обране ⭐
    operationId: addToSave
    tags:
      - Stories
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
    responses:
      '200':
        description: Історію додано до збережених
      '401':
        description: Неавторизований

  delete:
    summary: Видалити з обраного ❌
    operationId: removeFromSave
    tags:
      - Stories
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-fA-F0-9]{24}$'
    responses:
      '204':
        description: Історію видалено зі збережених
